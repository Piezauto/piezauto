<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Piezauto</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: var(--gris-claro);
      display: flex;
      flex-direction: column;
    }
    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .auth-card {
      background: var(--blanco);
      border-radius: 16px;
      box-shadow: var(--sombra);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-logo a {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #E63946 0%, #ff6b6b 50%, #c1121f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-titulo {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--negro);
      margin-bottom: 4px;
    }
    .auth-subtitulo {
      text-align: center;
      font-size: 13px;
      color: var(--gris-text);
      margin-bottom: 28px;
    }
    .form-grupo {
      margin-bottom: 16px;
    }
    .form-grupo label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--negro);
      margin-bottom: 6px;
    }
    .form-grupo input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--gris);
      border-radius: var(--radio);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-grupo input:focus { border-color: var(--rojo); }
    .olvidaste {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }
    .olvidaste button {
      background: none;
      border: none;
      color: var(--rojo);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
    }
    .olvidaste button:hover { text-decoration: underline; }
    .alerta {
      padding: 12px 14px;
      border-radius: var(--radio);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .alerta.error   { background: #fff0f0; color: #c1121f; border: 1px solid #ffd0d0; }
    .alerta.success { background: #f0fff4; color: #166534; border: 1px solid #bbf7d0; }
    .alerta.info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .alerta.visible { display: block; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--rojo);
      color: var(--blanco);
      border: none;
      border-radius: var(--radio);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--gris-text);
    }
    .auth-footer a { color: var(--rojo); font-weight: 600; }
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body class="auth-page">

<header class="header">
  <a href="index.html" class="header-logo">Piezauto</a>
  <nav class="header-nav">
    <a href="registro.html" style="color:#fff">Crear cuenta</a>
  </nav>
</header>

<main class="auth-main">
  <div class="auth-card">
    <div class="auth-logo"><a href="index.html">Piezauto</a></div>
    <h1 class="auth-titulo">Bienvenido de vuelta</h1>
    <p class="auth-subtitulo">Ingresá con tu cuenta Piezauto</p>

    <div class="alerta error"   id="alerta-error"></div>
    <div class="alerta success" id="alerta-ok"></div>
    <div class="alerta info"    id="alerta-info"></div>

    <form id="form-login" novalidate>
      <div class="form-grupo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="vos@email.com"
               autocomplete="email" required>
      </div>

      <div class="form-grupo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Tu contraseña"
               autocomplete="current-password" required>
      </div>

      <div class="olvidaste">
        <button type="button" id="btn-reset">¿Olvidaste tu contraseña?</button>
      </div>

      <button type="submit" class="btn-login" id="btn-submit">
        Ingresar
      </button>
    </form>

    <div class="auth-footer">
      ¿No tenés cuenta? <a href="registro.html">Registrate acá</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-check.js"></script>
<script src="js/auth-b2c.js"></script>
<script>
  // Redirigir si ya está logueado
  (async () => {
    const cliente = await getClienteActual();
    if (cliente) {
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redirect || '/perfil.html';
    }
  })();

  const form       = document.getElementById('form-login');
  const btnSubmit  = document.getElementById('btn-submit');
  const alertaError= document.getElementById('alerta-error');
  const alertaOk   = document.getElementById('alerta-ok');
  const alertaInfo = document.getElementById('alerta-info');

  function mostrarError(msg) {
    alertaError.textContent = msg;
    alertaError.classList.add('visible');
    alertaOk.classList.remove('visible');
    alertaInfo.classList.remove('visible');
  }
  function mostrarOk(msg) {
    alertaOk.textContent = msg;
    alertaOk.classList.add('visible');
    alertaError.classList.remove('visible');
    alertaInfo.classList.remove('visible');
  }
  function mostrarInfo(msg) {
    alertaInfo.textContent = msg;
    alertaInfo.classList.add('visible');
    alertaError.classList.remove('visible');
    alertaOk.classList.remove('visible');
  }
  function limpiarAlertas() {
    alertaError.classList.remove('visible');
    alertaOk.classList.remove('visible');
    alertaInfo.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    limpiarAlertas();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email)    return mostrarError('Ingresá tu email.');
    if (!password) return mostrarError('Ingresá tu contraseña.');

    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Ingresando...';

    const resultado = await loginCliente(email, password);

    if (!resultado.ok) {
      mostrarError(resultado.error);
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Ingresar';
      return;
    }

    mostrarOk('¡Bienvenido! Redirigiendo...');
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    setTimeout(() => { window.location.href = redirect || '/perfil.html'; }, 1000);
  });

  document.getElementById('btn-reset').addEventListener('click', async () => {
    limpiarAlertas();
    const email = document.getElementById('email').value.trim();
    if (!email) return mostrarError('Ingresá tu email primero para recuperar la contraseña.');

    const resultado = await resetPasswordCliente(email);
    if (resultado.ok) {
      mostrarInfo('Te enviamos un email para restablecer tu contraseña. Revisá tu bandeja (y el spam).');
    } else {
      mostrarError(resultado.error);
    }
  });
</script>
</body>
</html>
