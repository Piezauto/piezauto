<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso Taller — Piezauto</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    body { background: var(--negro); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 40px; margin-bottom: 8px; }
    .logo h1 { font-size: 20px; font-weight: 800; color: var(--negro); margin-bottom: 2px; }
    .logo p  { font-size: 13px; color: #888; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
    .form-row input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 15px; outline: none; box-sizing: border-box; transition: border-color .2s;
    }
    .form-row input:focus { border-color: var(--rojo); }
    #btn-login {
      width: 100%; padding: 14px; background: var(--rojo); color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 800;
      cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    #btn-login:hover:not(:disabled) { background: var(--rojo-dark); }
    #btn-login:disabled { opacity: 0.6; cursor: default; }
    #login-msg { font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; color: #c00; }
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: #aaa; }
    .back-link a { color: var(--rojo); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth-b2c.js"></script>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🔧</div>
    <h1>Panel de Taller</h1>
    <p>Ingresá con la cuenta asignada por Piezauto</p>
  </div>

  <div id="error-banner" style="display:none;background:#fff0f0;border:1px solid #fcc;border-radius:8px;padding:10px 12px;font-size:13px;color:#c00;margin-bottom:16px"></div>

  <div class="form-row">
    <label>Email</label>
    <input type="email" id="f-email" placeholder="taller@ejemplo.com" autocomplete="username">
  </div>
  <div class="form-row">
    <label>Contraseña</label>
    <input type="password" id="f-pass" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button id="btn-login" onclick="doLogin()">Ingresar</button>
  <div id="login-msg"></div>

  <div class="back-link"><a href="/">← Volver al sitio</a></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
if (params.get('error') === 'no_autorizado') {
  document.getElementById('error-banner').style.display = 'block';
  document.getElementById('error-banner').textContent   = 'Esta cuenta no tiene permisos de taller. Contactá a Piezauto.';
}

document.getElementById('f-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('f-email').value.trim();
  const pass  = document.getElementById('f-pass').value;
  const btn   = document.getElementById('btn-login');
  const msg   = document.getElementById('login-msg');

  if (!email || !pass) { msg.textContent = 'Completá email y contraseña.'; return; }

  btn.disabled = true; msg.textContent = 'Verificando...'; msg.style.color = '#888';

  const { data, error } = await dbB2C.auth.signInWithPassword({ email, password: pass });

  if (error || !data?.session) {
    msg.style.color = '#c00';
    msg.textContent = 'Email o contraseña incorrectos.';
    btn.disabled = false;
    return;
  }

  const meta = data.session.user?.user_metadata || {};
  if (meta.role !== 'taller' || !meta.taller_id) {
    await dbB2C.auth.signOut();
    msg.style.color = '#c00';
    msg.textContent = 'Esta cuenta no tiene permisos de taller. Contactá a Piezauto.';
    btn.disabled = false;
    return;
  }

  window.location.href = '/taller/dashboard.html';
}

// Si ya está logueado como taller, redirigir
dbB2C.auth.getSession().then(({ data }) => {
  const meta = data?.session?.user?.user_metadata || {};
  if (meta.role === 'taller') window.location.href = '/taller/dashboard.html';
});
</script>
</body>
</html>
