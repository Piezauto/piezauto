<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar presupuesto — Piezauto Point</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent:#E63946; --negro:#1a1a1a; --gris-claro:#f8f8f8; --sombra:0 2px 12px rgba(0,0,0,.08); --radius:10px; }
    body { background: var(--gris-claro); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .header { background: var(--negro); color: #fff; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 15px; font-weight: 900; background: linear-gradient(135deg,#E63946,#ff6b6b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .header-title { font-size: 14px; font-weight: 600; color: #aaa; flex: 1; }
    .header-back { color: #888; font-size: 13px; text-decoration: none; }

    .wrap { max-width: 640px; margin: 0 auto; padding: 20px 16px 80px; }

    /* Solicitud info box */
    .sol-box { background: var(--negro); color: #fff; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px; }
    .sol-box-titulo { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .sol-box-meta { font-size: 12px; color: #aaa; line-height: 1.7; }
    .sol-box-desc { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* Form card */
    .form-card { background: #fff; border-radius: var(--radius); box-shadow: var(--sombra); padding: 22px; margin-bottom: 16px; }
    .form-section-title { font-size: 14px; font-weight: 800; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none; font-family: inherit; transition: border-color .2s;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-hint { font-size: 11px; color: #aaa; margin-top: 4px; }

    /* Items repeater */
    .items-lista { margin-bottom: 10px; }
    .item-row-pres { display: grid; grid-template-columns: 1fr 60px 90px 28px; gap: 6px; align-items: center; margin-bottom: 6px; }
    .item-row-pres input { padding: 7px 10px; font-size: 13px; }
    .btn-rm-item { background: #fce8e8; color: #c00; border: none; border-radius: 6px; width: 28px; height: 36px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-add-item { background: #f5f5f5; color: #555; border: 1.5px dashed #ddd; border-radius: 7px; padding: 8px; font-size: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: all .15s; }
    .btn-add-item:hover { border-color: var(--accent); color: var(--accent); }
    .items-header { display: grid; grid-template-columns: 1fr 60px 90px 28px; gap: 6px; font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }

    /* Totalizador */
    .total-box { background: #f8f8f8; border-radius: 8px; padding: 12px 14px; margin-top: 12px; font-size: 13px; }
    .total-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .total-row.main { font-weight: 800; font-size: 16px; color: var(--accent); margin-top: 6px; padding-top: 8px; border-top: 1px solid #eee; }

    /* Botón enviar */
    .btn-enviar { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 800; cursor: pointer; transition: opacity .2s; }
    .btn-enviar:hover:not(:disabled) { opacity: .88; }
    .btn-enviar:disabled { opacity: .5; cursor: not-allowed; }
    .msg-envio { text-align: center; font-size: 13px; margin-top: 10px; min-height: 16px; }
    .msg-envio.ok  { color: #2e7d32; }
    .msg-envio.err { color: var(--accent); }

    .spinner-wrap { display: flex; justify-content: center; padding: 50px; }
    .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
<script src="../js/auth-check.js"></script>
</head>
<body>

<div id="taller-header"></div>

<div class="wrap">
  <div id="loading-wrap" class="spinner-wrap"><div class="spinner"></div></div>
  <div id="form-contenido" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth-b2c.js"></script>
<script src="auth-taller.js"></script>

<script>
const SVC_LABEL = {
  aceite:'Aceite / Service', frenos:'Frenos', suspension:'Suspensión', direccion:'Dirección',
  motor:'Motor', transmision:'Transmisión', electrico:'Eléctrico', aire:'Aire acond.',
  embrague:'Embrague', escape:'Escape', bateria:'Batería', gomas:'Gomas', chapa_pintura:'Chapa y pintura',
};
const FDATE = ts => ts ? new Date(ts).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' }) : '—';

let _tallerId  = null;
let _solicitud = null;
let _items     = [];

async function init() {
  const auth = await requireTallerAuth();
  if (!auth) return;
  await initTallerHeader();
  const { meta } = auth;
  _tallerId = meta.taller_id;

  const params   = new URLSearchParams(window.location.search);
  const solId    = params.get('solicitud_id');
  if (!solId) { window.location.href = 'solicitudes-zona.html'; return; }

  // Verificar que el taller fue notificado
  const { data: notif } = await dbB2C
    .from('cat_solicitudes_talleres_notificados')
    .select('id, estado')
    .eq('solicitud_id', solId)
    .eq('taller_id', _tallerId)
    .maybeSingle();

  if (!notif) { window.location.href = 'solicitudes-zona.html'; return; }

  // Verificar que no respondió ya
  if (notif.estado === 'respondio') {
    document.getElementById('loading-wrap').innerHTML = `
      <div style="text-align:center;padding:40px;color:#2e7d32">
        <div style="font-size:44px;margin-bottom:12px">✅</div>
        <div style="font-size:16px;font-weight:700">Ya enviaste tu presupuesto</div>
        <div style="font-size:13px;color:#888;margin-top:8px">El cliente puede verlo en el comparador.</div>
        <a href="solicitudes-zona.html" style="display:inline-block;margin-top:16px;color:#E63946;font-weight:700;text-decoration:none">← Volver a solicitudes</a>
      </div>`;
    return;
  }

  const { data: sol } = await db
    .from('cat_solicitudes_presupuesto')
    .select('id, titulo, descripcion, servicio_codigo, zona_radio_km, direccion_referencia, fecha_limite_respuesta')
    .eq('id', solId)
    .single();

  if (!sol) { window.location.href = 'solicitudes-zona.html'; return; }
  _solicitud = sol;

  document.getElementById('loading-wrap').style.display = 'none';
  renderForm();
}

function renderForm() {
  const hoy     = new Date().toISOString().split('T')[0];
  const default15 = new Date(Date.now() + 15 * 86400000).toISOString().split('T')[0];
  const svcLabel  = SVC_LABEL[_solicitud.servicio_codigo] || '—';

  document.getElementById('form-contenido').innerHTML = `
    <!-- Info solicitud -->
    <div class="sol-box">
      <div class="sol-box-titulo">${escHtml(_solicitud.titulo)}</div>
      <div class="sol-box-meta">
        ${svcLabel} · Zona: ${_solicitud.zona_radio_km} km · ${escHtml(_solicitud.direccion_referencia || '')}<br>
        Vence: ${FDATE(_solicitud.fecha_limite_respuesta)}
      </div>
      <div class="sol-box-desc">${escHtml(_solicitud.descripcion)}</div>
    </div>

    <!-- Monto -->
    <div class="form-card">
      <div class="form-section-title">💰 Monto estimado</div>
      <div class="form-2col">
        <div class="form-row">
          <label>Mínimo ($) *</label>
          <input type="number" id="inp-min" min="0" step="100" placeholder="0" oninput="actualizarTotal()">
        </div>
        <div class="form-row">
          <label>Máximo ($)</label>
          <input type="number" id="inp-max" min="0" step="100" placeholder="Opcional">
        </div>
      </div>
      <div class="form-row" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="inp-iva" checked style="width:auto;accent-color:var(--accent)">
        <label for="inp-iva" style="font-size:13px;color:#444;text-transform:none;letter-spacing:0">Precio incluye IVA</label>
      </div>
    </div>

    <!-- Propuesta -->
    <div class="form-card">
      <div class="form-section-title">📝 Propuesta</div>
      <div class="form-row">
        <label>Descripción de la propuesta *</label>
        <textarea id="inp-propuesta" rows="4" placeholder="Describí qué trabajo vas a hacer, qué piezas incluye, si usás repuestos originales o alternativos, etc."></textarea>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Plazo estimado (días)</label>
          <input type="number" id="inp-tiempo" min="0" step="1" placeholder="Ej: 2">
        </div>
        <div class="form-row">
          <label>Disponibilidad desde</label>
          <input type="date" id="inp-disponibilidad" min="${hoy}" value="${hoy}">
        </div>
      </div>
    </div>

    <!-- Items detallados (opcional) -->
    <div class="form-card">
      <div class="form-section-title">📦 Items detallados <span style="font-size:11px;font-weight:400;color:#aaa">(opcional)</span></div>
      <div class="items-header">
        <span>Descripción</span><span>Cant.</span><span>Precio unit.</span><span></span>
      </div>
      <div id="items-lista"></div>
      <button class="btn-add-item" onclick="addItem()">+ Agregar item</button>
      <div class="total-box" id="total-box" style="display:none">
        <div class="total-row"><span>Subtotal items</span><span id="total-sub">$0</span></div>
        <div class="total-row main"><span>Total</span><span id="total-val">$0</span></div>
      </div>
    </div>

    <!-- Validez -->
    <div class="form-card">
      <div class="form-section-title">📅 Validez y notas</div>
      <div class="form-row">
        <label>Presupuesto válido hasta *</label>
        <input type="date" id="inp-validez" min="${hoy}" value="${default15}">
      </div>
      <div class="form-row">
        <label>Notas adicionales</label>
        <textarea id="inp-notas" rows="2" placeholder="Ej: Incluye mano de obra. Repuestos a confirmar disponibilidad."></textarea>
      </div>
    </div>

    <button class="btn-enviar" id="btn-enviar" onclick="enviarPresupuesto()">Enviar presupuesto →</button>
    <div class="msg-envio" id="msg-envio"></div>
  `;

  document.getElementById('form-contenido').style.display = 'block';
  renderItems();
}

function addItem() {
  _items.push({ desc: '', cant: 1, precio: 0 });
  renderItems();
}

function rmItem(i) {
  _items.splice(i, 1);
  renderItems();
}

function renderItems() {
  const lista = document.getElementById('items-lista');
  lista.innerHTML = _items.map((item, i) => `
    <div class="item-row-pres">
      <input type="text" value="${escHtml(item.desc)}" placeholder="Descripción" oninput="_items[${i}].desc=this.value;actualizarTotal()">
      <input type="number" value="${item.cant}" min="1" oninput="_items[${i}].cant=parseInt(this.value)||1;actualizarTotal()">
      <input type="number" value="${item.precio}" min="0" step="100" placeholder="$0" oninput="_items[${i}].precio=parseFloat(this.value)||0;actualizarTotal()">
      <button class="btn-rm-item" onclick="rmItem(${i})">✕</button>
    </div>`).join('');
  actualizarTotal();
}

function actualizarTotal() {
  const totalBox = document.getElementById('total-box');
  if (!totalBox) return;
  const sub = _items.reduce((s, it) => s + (it.cant || 1) * (it.precio || 0), 0);
  if (_items.length === 0) { totalBox.style.display = 'none'; return; }
  totalBox.style.display = 'block';
  document.getElementById('total-sub').textContent = '$' + sub.toLocaleString('es-AR');
  document.getElementById('total-val').textContent = '$' + sub.toLocaleString('es-AR');

  // Sugerir monto mínimo si está vacío
  const inpMin = document.getElementById('inp-min');
  if (inpMin && !inpMin.value && sub > 0) inpMin.placeholder = sub.toString();
}

async function enviarPresupuesto() {
  const btn    = document.getElementById('btn-enviar');
  const msg    = document.getElementById('msg-envio');
  const min    = parseFloat(document.getElementById('inp-min').value) || 0;
  const max    = parseFloat(document.getElementById('inp-max').value) || null;
  const prop   = document.getElementById('inp-propuesta').value.trim();
  const validez = document.getElementById('inp-validez').value;

  if (!min)   { msg.textContent = 'Ingresá el monto mínimo estimado.'; msg.className = 'msg-envio err'; return; }
  if (!prop)  { msg.textContent = 'Describí tu propuesta.'; msg.className = 'msg-envio err'; return; }
  if (!validez) { msg.textContent = 'Indicá la validez del presupuesto.'; msg.className = 'msg-envio err'; return; }

  btn.disabled = true;
  btn.textContent = 'Enviando...';
  msg.textContent = '';

  const payload = {
    solicitud_id:         _solicitud.id,
    taller_id:            _tallerId,
    monto_estimado_min:   min,
    monto_estimado_max:   max,
    incluye_iva:          document.getElementById('inp-iva').checked,
    descripcion_propuesta: prop,
    detalles_items:       _items.length ? _items : [],
    tiempo_estimado_dias: parseInt(document.getElementById('inp-tiempo').value) || null,
    fecha_disponibilidad: document.getElementById('inp-disponibilidad').value || null,
    validez_hasta:        validez,
    notas:                document.getElementById('inp-notas').value.trim() || null,
  };

  const { error } = await dbB2C.from('cat_presupuestos_respuesta').insert(payload);

  if (error) {
    if (error.code === '23505') {
      msg.textContent = 'Ya enviaste un presupuesto para esta solicitud.';
    } else {
      msg.textContent = 'Error: ' + error.message;
    }
    msg.className = 'msg-envio err';
    btn.disabled = false;
    btn.textContent = 'Enviar presupuesto →';
    return;
  }

  msg.textContent = '✅ ¡Presupuesto enviado! El cliente puede verlo en el comparador.';
  msg.className   = 'msg-envio ok';
  btn.textContent = '✅ Enviado';

  setTimeout(() => { window.location.href = 'solicitudes-zona.html'; }, 2000);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
