<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar piezas â€” Piezauto</title>
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    body { background: var(--gris-claro); }

    /* â”€â”€ Header B2C â”€â”€ */
    #header-b2c {
      background: var(--negro);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .hb2c-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hb2c-logo { text-decoration: none; font-size: 20px; font-weight: 900; flex-shrink: 0; }
    .hb2c-logo-pz  { color: var(--blanco); }
    .hb2c-logo-auto { color: var(--rojo); }
    .hb2c-search {
      flex: 1;
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      max-width: 600px;
    }
    .hb2c-search input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 10px 14px;
      color: var(--blanco);
      font-size: 14px;
    }
    .hb2c-search input::placeholder { color: #888; }
    .hb2c-search button {
      background: var(--rojo);
      border: none;
      padding: 0 16px;
      cursor: pointer;
      color: var(--blanco);
      display: flex;
      align-items: center;
    }
    .hb2c-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .hb2c-carrito {
      position: relative;
      color: var(--blanco);
      text-decoration: none;
      display: flex;
    }
    .hb2c-badge {
      position: absolute;
      top: -7px;
      right: -7px;
      background: var(--rojo);
      color: var(--blanco);
      border-radius: 50%;
      min-width: 18px;
      height: 18px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px;
    }
    .hb2c-user {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--blanco);
    }
    .hb2c-avatar {
      width: 32px;
      height: 32px;
      background: var(--rojo);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }
    .hb2c-nombre { font-size: 13px; font-weight: 600; }
    .hb2c-btn-login {
      background: var(--rojo);
      color: var(--blanco);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: var(--radio);
      font-size: 13px;
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .hb2c-nombre { display: none; }
      .hb2c-logo { font-size: 17px; }
    }

    /* â”€â”€ Layout â”€â”€ */
    .buscar-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 48px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 20px;
    }
    @media (max-width: 700px) {
      .buscar-layout {
        grid-template-columns: 1fr;
      }
    }

    /* â”€â”€ Sidebar filtros â”€â”€ */
    .filtros-panel {
      background: var(--blanco);
      border-radius: 12px;
      box-shadow: var(--sombra);
      padding: 20px;
      align-self: start;
      position: sticky;
      top: 70px;
    }
    .filtros-titulo {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gris-text);
      margin-bottom: 16px;
    }
    .filtro-grupo { margin-bottom: 16px; }
    .filtro-grupo label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gris-text);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .filtro-grupo select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--gris);
      border-radius: var(--radio);
      font-size: 14px;
      background: var(--blanco);
      cursor: pointer;
    }
    .btn-limpiar-filtros {
      width: 100%;
      padding: 9px;
      border: 1px solid var(--gris);
      border-radius: var(--radio);
      background: var(--blanco);
      font-size: 13px;
      color: var(--gris-text);
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-limpiar-filtros:hover { background: var(--gris-claro); }

    /* â”€â”€ Banner vehÃ­culo â”€â”€ */
    #banner-vehiculo {
      display: none;
      align-items: center;
      gap: 8px;
      background: #e8f4fd;
      border: 1px solid #bce0f8;
      border-radius: var(--radio);
      padding: 10px 14px;
      font-size: 13px;
      color: #1a5276;
      margin-bottom: 16px;
    }
    .banner-quitar {
      background: none;
      border: none;
      color: var(--rojo);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-left: auto;
      padding: 0;
    }

    /* â”€â”€ Resultados â”€â”€ */
    .resultados-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    #stats-busqueda {
      font-size: 13px;
      color: var(--gris-text);
    }
    #loader-busqueda {
      display: none;
      justify-content: center;
      padding: 48px;
      color: var(--gris-text);
      font-size: 14px;
      gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--gris);
      border-top-color: var(--rojo);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #sin-resultados {
      display: none;
      text-align: center;
      padding: 48px 16px;
      color: var(--gris-text);
    }
    #sin-resultados .sin-icono { font-size: 48px; margin-bottom: 12px; }
    #sin-resultados h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--negro); }
    .error-msg { color: var(--rojo); padding: 16px; font-size: 14px; }

    /* â”€â”€ Tarjetas SKU â”€â”€ */
    #resultados { display: flex; flex-direction: column; gap: 10px; }
    .tarjeta-sku {
      background: var(--blanco);
      border-radius: 10px;
      box-shadow: var(--sombra);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.1s;
      border: 1px solid transparent;
    }
    .tarjeta-sku:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transform: translateY(-1px);
      border-color: var(--rojo);
    }
    .tarjeta-sku-body { flex: 1; min-width: 0; }
    .tarjeta-sku-familia {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--rojo);
      margin-bottom: 3px;
    }
    .tarjeta-sku-desc {
      font-size: 15px;
      font-weight: 600;
      color: var(--negro);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tarjeta-sku-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tarjeta-sku-prov {
      font-size: 12px;
      color: var(--gris-text);
    }
    .tarjeta-sku-cod {
      font-size: 11px;
      color: #999;
      font-family: monospace;
    }
    .tag-lado {
      font-size: 11px;
      font-weight: 700;
      background: #f0f0f0;
      color: #555;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .tarjeta-sku-precio {
      font-size: 18px;
      font-weight: 800;
      color: var(--rojo);
      white-space: nowrap;
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .tarjeta-sku { flex-direction: column; align-items: flex-start; }
      .tarjeta-sku-precio { font-size: 20px; }
    }

    /* â”€â”€ PaginaciÃ³n â”€â”€ */
    #paginacion {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--gris);
    }
    .btn-pag {
      padding: 8px 18px;
      border: 1px solid var(--gris);
      border-radius: var(--radio);
      background: var(--blanco);
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-pag:hover:not(:disabled) { background: var(--rojo); color: var(--blanco); border-color: var(--rojo); }
    .btn-pag:disabled { opacity: 0.4; cursor: default; }
    .pag-info { font-size: 13px; color: var(--gris-text); }

    /* â”€â”€ VacÃ­o inicial â”€â”€ */
    .buscar-hero {
      text-align: center;
      padding: 48px 16px;
    }
    .buscar-hero h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .buscar-hero p { font-size: 14px; color: var(--gris-text); }
  </style>
</head>
<body>

<header id="header-b2c"></header>

<main class="buscar-layout">

  <!-- Sidebar filtros -->
  <aside class="filtros-panel">
    <div class="filtros-titulo">Filtros</div>

    <div id="banner-vehiculo"></div>

    <div class="filtro-grupo">
      <label for="sel-familia">Familia</label>
      <select id="sel-familia">
        <option value="">Todas las familias</option>
      </select>
    </div>

    <div class="filtro-grupo">
      <label for="sel-marca">Marca de auto</label>
      <select id="sel-marca">
        <option value="">Todas las marcas</option>
      </select>
    </div>

    <button id="btn-limpiar-filtros" class="btn-limpiar-filtros">Limpiar filtros</button>
  </aside>

  <!-- Ãrea de resultados -->
  <section>
    <div class="resultados-header">
      <span id="stats-busqueda"></span>
    </div>

    <div id="loader-busqueda">
      <div class="spinner"></div>
      Buscandoâ€¦
    </div>

    <div id="sin-resultados">
      <div class="sin-icono">ðŸ”</div>
      <h3>Sin resultados</h3>
      <p>ProbÃ¡ con otras palabras o eliminÃ¡ los filtros.</p>
    </div>

    <div id="resultados"></div>
    <div id="paginacion"></div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-check.js"></script>
<script src="js/auth-b2c.js"></script>
<script src="js/header-b2c.js"></script>
<script src="js/buscar.js"></script>
<script>
  initHeaderB2C();
  initBuscar();
</script>
</body>
</html>
