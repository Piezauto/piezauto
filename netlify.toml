[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/point"
  to     = "/point/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control          = "no-cache, no-store, must-revalidate"
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*.html"
  [headers.values]
    Cache-Control          = "no-cache, no-store, must-revalidate"
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/point/*.html"
  [headers.values]
    Cache-Control          = "no-cache, no-store, must-revalidate"
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
