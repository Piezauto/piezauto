<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto — Piezauto</title>
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    body { background: var(--gris-claro); }

    /* ── Header B2C ── */
    #header-b2c { background:var(--negro); position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .hb2c-inner { max-width:1100px; margin:0 auto; padding:12px 16px; display:flex; align-items:center; gap:12px; }
    .hb2c-logo { text-decoration:none; font-size:20px; font-weight:900; flex-shrink:0; }
    .hb2c-logo-pz { color:var(--blanco); }
    .hb2c-logo-auto { color:var(--rojo); }
    .hb2c-search { flex:1; display:flex; background:rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; max-width:600px; }
    .hb2c-search input { flex:1; background:transparent; border:none; outline:none; padding:10px 14px; color:var(--blanco); font-size:14px; }
    .hb2c-search input::placeholder { color:#888; }
    .hb2c-search button { background:var(--rojo); border:none; padding:0 16px; cursor:pointer; color:var(--blanco); display:flex; align-items:center; }
    .hb2c-actions { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .hb2c-carrito { position:relative; color:var(--blanco); text-decoration:none; display:flex; }
    .hb2c-badge { position:absolute; top:-7px; right:-7px; background:var(--rojo); color:var(--blanco); border-radius:50%; min-width:18px; height:18px; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 2px; }
    .hb2c-user { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--blanco); }
    .hb2c-avatar { width:32px; height:32px; background:var(--rojo); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
    .hb2c-nombre { font-size:13px; font-weight:600; }
    .hb2c-btn-login { background:var(--rojo); color:var(--blanco); text-decoration:none; padding:8px 16px; border-radius:var(--radio); font-size:13px; font-weight:600; }
    @media (max-width:480px) { .hb2c-nombre { display:none; } }

    /* ── Layout ── */
    .producto-layout { max-width:900px; margin:0 auto; padding:20px 16px 60px; }

    /* ── Breadcrumb ── */
    #breadcrumb { font-size:13px; color:var(--gris-text); margin-bottom:16px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    #breadcrumb a { color:var(--gris-text); text-decoration:none; }
    #breadcrumb a:hover { color:var(--rojo); }
    #breadcrumb span:last-child { color:var(--negro); font-weight:600; }

    /* ── Loader ── */
    #loader-producto { display:flex; justify-content:center; align-items:center; gap:10px; padding:80px; color:var(--gris-text); }
    .spinner { width:22px; height:22px; border:2px solid var(--gris); border-top-color:var(--rojo); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #error-producto { display:none; text-align:center; padding:48px; color:var(--gris-text); font-size:16px; }
    #ficha-container { display:none; }

    /* ── Ficha grid ── */
    .ficha-grid { display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }
    @media (max-width:700px) { .ficha-grid { grid-template-columns:1fr; } }

    .ficha-card { background:var(--blanco); border-radius:12px; box-shadow:var(--sombra); padding:24px; }
    #sku-familia { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--rojo); margin-bottom:6px; }
    #sku-titulo { font-size:20px; font-weight:700; color:var(--negro); line-height:1.3; margin-bottom:8px; }
    #sku-codigo { font-size:13px; color:var(--gris-text); font-family:monospace; margin-bottom:6px; }
    #sku-proveedor, #sku-fabricante { display:none; font-size:13px; color:var(--gris-text); margin-bottom:4px; }
    #sku-tags { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
    .tag { background:#f0f0f0; color:#555; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    #sku-oem-container { display:none; margin-bottom:12px; }
    .oem-label { font-size:12px; font-weight:700; color:var(--gris-text); text-transform:uppercase; letter-spacing:0.4px; }
    #sku-oem { font-family:monospace; font-size:13px; color:#333; margin-top:3px; }

    /* Atributos */
    #tabla-atributos { display:none; margin-top:16px; }
    .attr-fila { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--gris); font-size:13px; }
    .attr-fila:last-child { border-bottom:none; }
    .attr-key { color:var(--gris-text); font-weight:600; }
    .attr-val { color:var(--negro); text-align:right; }

    /* Panel compra */
    .compra-card { background:var(--blanco); border-radius:12px; box-shadow:var(--sombra); padding:24px; position:sticky; top:74px; }
    #sku-precio { font-size:32px; font-weight:900; color:var(--rojo); margin-bottom:4px; }
    #sku-precio.precio-consultar { font-size:20px; color:var(--gris-text); }
    .precio-nota { font-size:12px; color:var(--gris-text); margin-bottom:20px; }
    .cantidad-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .cantidad-row label { font-size:13px; font-weight:600; color:var(--gris-text); }
    .cantidad-ctrl { display:flex; align-items:center; border:1px solid var(--gris); border-radius:var(--radio); overflow:hidden; }
    .cantidad-ctrl button { background:var(--gris-claro); border:none; width:36px; height:36px; font-size:18px; cursor:pointer; font-weight:700; }
    .cantidad-ctrl button:hover { background:var(--gris); }
    #cantidad-input { width:46px; text-align:center; border:none; outline:none; font-size:15px; font-weight:700; padding:0 4px; height:36px; }
    #btn-agregar-carrito { width:100%; padding:14px; background:var(--rojo); color:var(--blanco); border:none; border-radius:var(--radio); font-size:15px; font-weight:700; cursor:pointer; transition:background 0.15s; }
    #btn-agregar-carrito:hover { background:var(--rojo-dark); }
    .whatsapp-link { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px; padding:11px; border:1px solid var(--gris); border-radius:var(--radio); text-decoration:none; color:#25D366; font-size:13px; font-weight:600; }
    .whatsapp-link:hover { background:#f0fdf4; }

    /* Aplicaciones */
    .aplicaciones-seccion { background:var(--blanco); border-radius:12px; box-shadow:var(--sombra); padding:24px; margin-top:20px; display:none; }
    .sec-titulo { font-size:15px; font-weight:700; margin-bottom:14px; color:var(--negro); }
    #aplicaciones-lista { list-style:none; padding:0; margin:0; columns:2; column-gap:16px; }
    #aplicaciones-lista li { font-size:13px; color:#444; padding:4px 0; border-bottom:1px solid #f5f5f5; break-inside:avoid; }
    .apps-mas { color:var(--gris-text); font-style:italic; }
    @media (max-width:480px) { #aplicaciones-lista { columns:1; } }

    /* Observaciones */
    .obs-seccion { background:#fffbec; border:1px solid #f0e68c; border-radius:var(--radio); padding:14px 18px; margin-top:16px; font-size:13px; color:#7a6a00; display:none; }

    /* Alternativas */
    #alternativas-seccion { display:none; margin-top:28px; }
    .alt-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .alt-motivo { font-size:12px; color:var(--gris-text); }
    #alternativas-lista { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; }
    .alt-tarjeta { background:var(--blanco); border-radius:10px; box-shadow:var(--sombra); padding:14px; text-decoration:none; color:inherit; border:1px solid transparent; transition:border-color 0.15s, box-shadow 0.15s; }
    .alt-tarjeta:hover { border-color:var(--rojo); box-shadow:0 4px 14px rgba(0,0,0,0.1); }
    .alt-desc { font-size:13px; font-weight:600; color:var(--negro); margin-bottom:4px; }
    .alt-meta { font-size:12px; color:var(--gris-text); margin-bottom:6px; }
    .alt-precio { font-size:15px; font-weight:800; color:var(--rojo); }

    @keyframes fadeInUp { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<header id="header-b2c"></header>

<main class="producto-layout">

  <div id="breadcrumb"></div>

  <div id="loader-producto">
    <div class="spinner"></div>
    Cargando producto…
  </div>
  <p id="error-producto"></p>

  <div id="ficha-container">
    <div class="ficha-grid">

      <!-- Datos -->
      <div>
        <div class="ficha-card">
          <div id="sku-familia"></div>
          <h1 id="sku-titulo"></h1>
          <div id="sku-codigo"></div>
          <div id="sku-proveedor"></div>
          <div id="sku-fabricante"></div>
          <div id="sku-tags"></div>
          <div id="sku-oem-container">
            <div class="oem-label">Código OEM</div>
            <div id="sku-oem"></div>
          </div>
          <div id="tabla-atributos"></div>
        </div>

        <div class="aplicaciones-seccion" id="aplicaciones-seccion">
          <div class="sec-titulo">Vehículos compatibles</div>
          <ul id="aplicaciones-lista"></ul>
        </div>

        <div class="obs-seccion" id="obs-seccion">
          <strong>Nota:</strong> <span id="sku-observaciones"></span>
        </div>
      </div>

      <!-- Compra -->
      <div>
        <div class="compra-card">
          <div id="sku-precio"></div>
          <div class="precio-nota">Precio público · IVA incluido</div>
          <div class="cantidad-row">
            <label>Cantidad</label>
            <div class="cantidad-ctrl">
              <button onclick="cambiarCantidad(-1)">−</button>
              <input type="number" id="cantidad-input" value="1" min="1" max="99">
              <button onclick="cambiarCantidad(1)">+</button>
            </div>
          </div>
          <button id="btn-agregar-carrito">Agregar al carrito</button>
          <a href="https://wa.me/5491122548257" target="_blank" class="whatsapp-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Consultar por WhatsApp
          </a>
        </div>
      </div>

    </div><!-- /ficha-grid -->

    <div id="alternativas-seccion">
      <div class="alt-header">
        <h2 class="sec-titulo" style="margin:0">Alternativas disponibles</h2>
        <span class="alt-motivo" id="alternativas-motivo"></span>
      </div>
      <div id="alternativas-lista"></div>
    </div>

  </div><!-- /ficha-container -->
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-b2c.js"></script>
<script src="js/header-b2c.js"></script>
<script src="js/carrito.js"></script>
<script src="js/producto.js"></script>
<script>
  function cambiarCantidad(delta) {
    const input = document.getElementById('cantidad-input');
    input.value = Math.max(1, Math.min(99, (parseInt(input.value) || 1) + delta));
  }
  initHeaderB2C();
  initProducto();
</script>
</body>
</html>
