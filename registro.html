  <link rel="stylesheet" href="css/estilos.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: var(--gris-claro);
      display: flex;
      flex-direction: column;
    }
    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .auth-card {
      background: var(--blanco);
      border-radius: 16px;
      box-shadow: var(--sombra);
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-logo a {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #E63946 0%, #ff6b6b 50%, #c1121f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-titulo {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--negro);
      margin-bottom: 4px;
    }
    .auth-subtitulo {
      text-align: center;
      font-size: 13px;
      color: var(--gris-text);
      margin-bottom: 28px;
    }
    .form-grupo {
      margin-bottom: 16px;
    }
    .form-grupo label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--negro);
      margin-bottom: 6px;
    }
    .form-grupo input,
    .form-grupo select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--gris);
      border-radius: var(--radio);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--blanco);
      color: var(--negro);
    }
    .form-grupo input:focus,
    .form-grupo select:focus {
      border-color: var(--rojo);
    }
    .form-grupo input.error,
    .form-grupo select.error {
      border-color: var(--rojo);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .codigo-hint {
      font-size: 12px;
      color: var(--gris-text);
      margin-top: 5px;
    }
    .codigo-hint span {
      font-weight: 600;
      color: var(--negro);
      font-family: monospace;
    }
    .alerta {
      padding: 12px 14px;
      border-radius: var(--radio);
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .alerta.error   { background: #fff0f0; color: #c1121f; border: 1px solid #ffd0d0; }
    .alerta.success { background: #f0fff4; color: #166534; border: 1px solid #bbf7d0; }
    .alerta.visible { display: block; }
    .btn-registro {
      width: 100%;
      padding: 13px;
      background: var(--rojo);
      color: var(--blanco);
      border: none;
      border-radius: var(--radio);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-registro:hover { opacity: 0.88; }
    .btn-registro:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--gris-text);
    }
    .auth-footer a {
      color: var(--rojo);
      font-weight: 600;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--gris);
      margin: 20px 0;
    }
    .paso-indicador {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .paso-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gris);
    }
    .paso-dot.activo { background: var(--rojo); }
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body class="auth-page">

<main class="auth-main">

      <div class="form-grupo">
        <label for="codigo">CÃ³digo de invitaciÃ³n *</label>
        <input type="text" id="codigo" name="codigo" placeholder="BETA-XXXXXX" autocomplete="off" required
               style="text-transform:uppercase; letter-spacing:1px; font-family:monospace; font-size:15px;">
        <p class="codigo-hint">Â¿No tenÃ©s cÃ³digo? <a href="unirse-point.html" style="color:var(--rojo)">PedÃ­ acceso anticipado</a></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-check.js"></script>
<script src="js/auth-b2c.js"></script>
<script>
  // Redirigir si ya estÃ¡ logueado
  (async () => {
    const cliente = await getClienteActual();
    if (cliente) window.location.href = '/perfil';
  })();

  const form = document.getElementById('form-registro');
  const btnSubmit = document.getElementById('btn-submit');
  const alertaError = document.getElementById('alerta-error');
  const alertaOk = document.getElementById('alerta-ok');

  function mostrarError(msg) {
    alertaError.textContent = msg;
    alertaError.classList.add('visible');
    alertaOk.classList.remove('visible');
    alertaError.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function mostrarOk(msg) {
    alertaOk.textContent = msg;
    alertaOk.classList.add('visible');
    alertaError.classList.remove('visible');
  }

  function limpiarAlertas() {
    alertaError.classList.remove('visible');
    alertaOk.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    limpiarAlertas();

    const nombre   = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const telefono = document.getElementById('telefono').value.trim();
    const localidad= document.getElementById('localidad').value.trim();
    const provincia= document.getElementById('provincia').value;
    const codigo   = document.getElementById('codigo').value.trim();

    if (!nombre || !apellido) return mostrarError('CompletÃ¡ tu nombre y apellido.');
    if (!email)               return mostrarError('IngresÃ¡ tu email.');
    if (password.length < 6)  return mostrarError('La contraseÃ±a debe tener al menos 6 caracteres.');
    if (!codigo)              return mostrarError('IngresÃ¡ tu cÃ³digo de invitaciÃ³n.');

    btnSubmit.disabled = true;
    btnSubmit.textContent = 'Creando cuenta...';

    const resultado = await registrarCliente(
      { nombre, apellido, email, password, telefono, localidad, provincia },
      codigo
    );

    if (!resultado.ok) {
      mostrarError(resultado.error);
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Crear cuenta';
      return;
    }

    mostrarOk('Â¡Cuenta creada! Redirigiendo a tu perfil...');
    setTimeout(() => { window.location.href = '/perfil'; }, 1500);
  });

  // Uppercase automÃ¡tico en campo cÃ³digo
  document.getElementById('codigo').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });
</script>
