<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis operaciones — Piezauto</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    body { background: var(--gris-claro); }
    .wrap { max-width: 800px; margin: 0 auto; padding: 28px 16px 60px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 24px; }

    .filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .filtros select {
      padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 13px; outline: none; background: #fff; cursor: pointer;
    }
    .filtros select:focus { border-color: var(--rojo); }

    .op-list { display: flex; flex-direction: column; gap: 12px; }
    .op-card {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      box-shadow: var(--sombra); border-left: 4px solid transparent;
      cursor: pointer; transition: box-shadow .2s;
    }
    .op-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    .op-card.pendiente { border-left-color: #f59e0b; }
    .op-card.pagado    { border-left-color: #3b82f6; }
    .op-card.enviado   { border-left-color: #8b5cf6; }
    .op-card.entregado { border-left-color: #22c55e; }
    .op-card.cancelado { border-left-color: #ef4444; }

    .op-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .op-info { flex: 1; }
    .op-num  { font-weight: 800; font-size: 14px; margin-bottom: 3px; }
    .op-meta { font-size: 12px; color: #777; margin-top: 3px; line-height: 1.6; }
    .op-total { font-size: 18px; font-weight: 800; color: var(--rojo); white-space: nowrap; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-pendiente { background: #fff8e1; color: #b45309; }
    .badge-pagado    { background: #dbeafe; color: #1d4ed8; }
    .badge-enviado   { background: #ede9fe; color: #7c3aed; }
    .badge-entregado { background: #dcfce7; color: #15803d; }
    .badge-cancelado { background: #fee2e2; color: #dc2626; }

    .taller-tag { display: inline-flex; align-items: center; gap: 4px; background: #f0f7ff; border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #1565c0; font-weight: 600; margin-top: 5px; }

    /* Modal detalle */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: #f0f0f0; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; padding-right: 40px; }
    .info-row { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; min-width: 120px; flex-shrink: 0; }
    .info-val { color: #333; font-weight: 600; }
    .item-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f8f8f8; }
    .section-h { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; margin: 16px 0 8px; }

    .taller-card { background: #f0f7ff; border: 1px solid #c3dafe; border-radius: 10px; padding: 14px; margin-top: 14px; }
    .taller-card .tn { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #1a56c4; }
    .taller-card .td { font-size: 12px; color: #555; }
    .taller-wa { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 12px; font-weight: 700; color: #22c55e; text-decoration: none; }

    .cancelar-btn { width: 100%; padding: 12px; background: #fff; border: 1.5px solid #ef4444; color: #ef4444; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 16px; transition: background .2s; }
    .cancelar-btn:hover { background: #fef2f2; }

    .spinner-wrap { display: flex; justify-content: center; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: var(--rojo); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; color: #aaa; padding: 50px 20px; }
    .empty a { color: var(--rojo); font-weight: 600; text-decoration: none; }

    /* Línea de tiempo de estado */
    .timeline { display: flex; align-items: center; gap: 0; margin: 16px 0; }
    .tl-step { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; margin-bottom: 4px; }
    .tl-dot.done { background: #22c55e; }
    .tl-dot.active { background: var(--rojo); box-shadow: 0 0 0 3px rgba(230,57,70,.2); }
    .tl-label { font-size: 10px; color: #aaa; text-align: center; }
    .tl-label.active { color: var(--rojo); font-weight: 700; }
    .tl-label.done { color: #22c55e; }
    .tl-line { flex: 1; height: 2px; background: #ddd; margin-bottom: 14px; }
    .tl-line.done { background: #22c55e; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-b2c.js"></script>

<div id="header-b2c-root"></div>
<script src="js/header-b2c.js"></script>

<div class="wrap">
  <h1>Mis operaciones</h1>
  <p class="sub">Historial de tus compras y pedidos en Piezauto.</p>

  <div class="filtros">
    <select id="filtro-estado" onchange="cargarOps()">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="pagado">Pagado</option>
      <option value="enviado">Enviado</option>
      <option value="entregado">Entregado</option>
      <option value="cancelado">Cancelado</option>
    </select>
  </div>

  <div id="ops-lista" class="op-list">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal-overlay" id="modal-op" onclick="cerrarModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title" id="modal-titulo">Cargando...</div>
    <div id="modal-contenido"></div>
  </div>
</div>

<script src="js/carrito.js"></script>
<script>
const ESTADOS_TL = ['pendiente','pagado','enviado','entregado'];
const ESTADO_LABELS = {
  pendiente: 'Pendiente de confirmación',
  pagado:    'Pago confirmado',
  enviado:   'Enviado',
  entregado: 'Entregado',
  cancelado: 'Cancelado',
};

async function initPage() {
  let session = null;
  try { const { data } = await dbB2C.auth.getSession(); session = data?.session; } catch {}
  if (!session) { window.location.href = 'login.html?redirect=/operaciones.html'; return; }

  if (typeof initHeaderB2C === 'function') initHeaderB2C();
  await cargarOps();
}

async function cargarOps() {
  const estado = document.getElementById('filtro-estado').value;
  const cliente = await getClienteActual();
  if (!cliente) {
    document.getElementById('ops-lista').innerHTML = '<div class="empty">No encontramos tu perfil. <a href="perfil.html">Completá tu perfil</a>.</div>';
    return;
  }

  let q = dbB2C
    .from('cat_operaciones_b2c')
    .select('id, estado, total, direccion_entrega, notas, created_at, updated_at, taller_id, metodo_pago, cat_recomendaciones_talleres!taller_id(nombre, direccion, localidad, whatsapp)')
    .eq('cliente_id', cliente.id)
    .order('created_at', { ascending: false })
    .limit(50);

  if (estado) q = q.eq('estado', estado);

  const { data: ops } = await q;
  renderLista(ops || []);
}

function renderLista(ops) {
  const wrap = document.getElementById('ops-lista');
  if (!ops.length) {
    wrap.innerHTML = `<div class="empty">
      <div style="font-size:40px;margin-bottom:12px">📦</div>
      <div style="font-size:16px;font-weight:700;color:#333;margin-bottom:8px">Sin operaciones todavía</div>
      <a href="buscar.html">Ir al catálogo →</a>
    </div>`;
    return;
  }

  wrap.innerHTML = ops.map(op => {
    const num   = op.id.slice(0,8).toUpperCase();
    const fecha = new Date(op.created_at).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
    const badge = `<span class="badge badge-${op.estado}">${ESTADO_LABELS[op.estado] || op.estado}</span>`;
    const notas = parseNotas(op.notas);
    const tallerNombre = op.cat_recomendaciones_talleres?.nombre || notas.taller?.nombre;
    const tallerTag = tallerNombre
      ? `<div class="taller-tag">🔧 ${escH(tallerNombre)}</div>`
      : '';
    const pago = op.metodo_pago || notas.metodo_pago;
    return `<div class="op-card ${op.estado}" onclick="abrirDetalle('${op.id}')">
      <div class="op-row">
        <div class="op-info">
          <div class="op-num">#${escH(num)}</div>
          <div style="margin-top:4px">${badge}</div>
          ${tallerTag}
          <div class="op-meta">${fecha}${pago ? ' · ' + pago : ''}</div>
        </div>
        <div class="op-total">$${Number(op.total).toLocaleString('es-AR')}</div>
      </div>
    </div>`;
  }).join('');
}

async function abrirDetalle(opId) {
  document.getElementById('modal-op').classList.add('open');
  document.getElementById('modal-titulo').textContent   = 'Cargando...';
  document.getElementById('modal-contenido').innerHTML  = '<div class="spinner-wrap"><div class="spinner"></div></div>';

  const { data: op } = await dbB2C
    .from('cat_operaciones_b2c')
    .select('id, estado, total, subtotal, descuento, direccion_entrega, notas, created_at, metodo_pago, taller_id, cat_recomendaciones_talleres!taller_id(nombre, razon_social, direccion, localidad, whatsapp)')
    .eq('id', opId).single();

  const { data: items } = await dbB2C
    .from('cat_operaciones_b2c_items')
    .select('cantidad, precio_unitario, subtotal, cat_skus!sku_id(codigo_piezauto, descripcion, descripcion_corta)')
    .eq('operacion_id', opId);

  if (!op) { document.getElementById('modal-titulo').textContent = 'Error'; return; }

  const num   = op.id.slice(0,8).toUpperCase();
  const notas = parseNotas(op.notas);
  const badge = `<span class="badge badge-${op.estado}">${ESTADO_LABELS[op.estado] || op.estado}</span>`;
  document.getElementById('modal-titulo').innerHTML = `Pedido #${num} ${badge}`;

  // Timeline
  const tlHtml = op.estado === 'cancelado'
    ? `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:13px;color:#c62828;margin-bottom:14px">❌ Este pedido fue cancelado.</div>`
    : (() => {
        const idx = ESTADOS_TL.indexOf(op.estado);
        let tl = '<div class="timeline">';
        ESTADOS_TL.forEach((e, i) => {
          const cls = i < idx ? 'done' : i === idx ? 'active' : '';
          if (i > 0) tl += `<div class="tl-line${i <= idx ? ' done' : ''}"></div>`;
          tl += `<div class="tl-step"><div class="tl-dot ${cls}"></div><div class="tl-label ${cls}">${e.charAt(0).toUpperCase()+e.slice(1)}</div></div>`;
        });
        tl += '</div>';
        return tl;
      })();

  // Items
  const itemsHtml = (items || []).map(i => {
    const sku = i.cat_skus || {};
    return `<div class="item-row">
      <span>${escH(sku.descripcion_corta || sku.descripcion || 'Autoparte')} <span style="color:#aaa;font-size:11px">${escH(sku.codigo_piezauto||'')}</span> x${i.cantidad}</span>
      <strong>$${Number(i.subtotal).toLocaleString('es-AR')}</strong>
    </div>`;
  }).join('');

  // Taller
  const taller = op.cat_recomendaciones_talleres || notas.taller;
  const tallerHtml = taller ? `
    <div class="taller-card">
      <div class="tn">🔧 ${escH(taller.nombre)}</div>
      <div class="td">${escH(taller.direccion || '')}${taller.localidad ? ', ' + escH(taller.localidad) : ''}</div>
      ${taller.whatsapp ? `<a class="taller-wa" href="https://wa.me/54${taller.whatsapp.replace(/\D/g,'')}" target="_blank">💬 Escribir al taller</a>` : ''}
      <div style="font-size:11px;color:#555;margin-top:8px;line-height:1.5">El taller va a contactarte para coordinar el turno de instalación.</div>
    </div>` : '';

  // Instrucciones de pago (si pendiente)
  const pagoHtml = op.estado === 'pendiente'
    ? `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px 14px;font-size:13px;color:#795548;margin-top:14px">
        ⏳ <strong>Pago pendiente:</strong> te contactamos por WhatsApp para confirmar el pago (transferencia o efectivo).
       </div>` : '';

  // Botón cancelar (solo si pendiente)
  const cancelBtn = op.estado === 'pendiente'
    ? `<button class="cancelar-btn" onclick="cancelarOp('${op.id}')">Cancelar pedido</button>` : '';

  const pago = op.metodo_pago || notas.metodo_pago;

  document.getElementById('modal-contenido').innerHTML = `
    ${tlHtml}
    <div class="section-h">Datos del pedido</div>
    <div class="info-row"><span class="info-label">Número</span><span class="info-val">#${escH(num)}</span></div>
    <div class="info-row"><span class="info-label">Fecha</span><span class="info-val">${new Date(op.created_at).toLocaleString('es-AR')}</span></div>
    <div class="info-row"><span class="info-label">Total</span><span class="info-val" style="color:var(--rojo);font-size:16px">$${Number(op.total).toLocaleString('es-AR')}</span></div>
    ${pago ? `<div class="info-row"><span class="info-label">Pago</span><span class="info-val">${escH(pago)}</span></div>` : ''}
    <div class="info-row"><span class="info-label">Entrega en</span><span class="info-val">${escH(op.direccion_entrega||'—')}</span></div>
    ${notas.notas_cliente ? `<div class="info-row"><span class="info-label">Tu nota</span><span class="info-val">${escH(notas.notas_cliente)}</span></div>` : ''}

    <div class="section-h" style="margin-top:16px">Piezas (${items?.length||0})</div>
    ${itemsHtml || '<div style="color:#aaa;font-size:13px">Sin items.</div>'}

    ${tallerHtml}
    ${pagoHtml}
    ${cancelBtn}`;
}

async function cancelarOp(opId) {
  if (!confirm('¿Cancelás este pedido? Esta acción no se puede deshacer.')) return;
  await dbB2C.from('cat_operaciones_b2c').update({ estado: 'cancelado', updated_at: new Date().toISOString() }).eq('id', opId);
  cerrarModal();
  await cargarOps();
}

function cerrarModal(evt) {
  if (evt && evt.target !== document.getElementById('modal-op')) return;
  document.getElementById('modal-op').classList.remove('open');
}

function parseNotas(n) { if (!n) return {}; try { return JSON.parse(n); } catch { return {}; } }
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
