<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis operaciones — Piezauto</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    body { background: var(--gris-claro); }
    .wrap { max-width: 800px; margin: 0 auto; padding: 28px 16px 60px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 24px; }

    .filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .filtros select {
      padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 13px; outline: none; background: #fff; cursor: pointer;
    }
    .filtros select:focus { border-color: var(--rojo); }

    .op-list { display: flex; flex-direction: column; gap: 12px; }
    .op-card {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      box-shadow: var(--sombra); border-left: 4px solid transparent;
      cursor: pointer; transition: box-shadow .2s;
    }
    .op-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    .op-card.pendiente { border-left-color: #f59e0b; }
    .op-card.pagado    { border-left-color: #3b82f6; }
    .op-card.enviado   { border-left-color: #8b5cf6; }
    .op-card.entregado { border-left-color: #22c55e; }
    .op-card.cancelado { border-left-color: #ef4444; }

    .op-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .op-info { flex: 1; }
    .op-num  { font-weight: 800; font-size: 14px; margin-bottom: 3px; }
    .op-meta { font-size: 12px; color: #777; margin-top: 3px; line-height: 1.6; }
    .op-total { font-size: 18px; font-weight: 800; color: var(--rojo); white-space: nowrap; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-pendiente { background: #fff8e1; color: #b45309; }
    .badge-pagado    { background: #dbeafe; color: #1d4ed8; }
    .badge-enviado   { background: #ede9fe; color: #7c3aed; }
    .badge-entregado { background: #dcfce7; color: #15803d; }
    .badge-cancelado { background: #fee2e2; color: #dc2626; }

    .taller-tag { display: inline-flex; align-items: center; gap: 4px; background: #f0f7ff; border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #1565c0; font-weight: 600; margin-top: 5px; }

    /* Modal detalle */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: #f0f0f0; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; padding-right: 40px; }
    .info-row { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; min-width: 120px; flex-shrink: 0; }
    .info-val { color: #333; font-weight: 600; }
    .item-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #f8f8f8; }
    .section-h { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; margin: 16px 0 8px; }

    .taller-card { background: #f0f7ff; border: 1px solid #c3dafe; border-radius: 10px; padding: 14px; margin-top: 14px; }
    .taller-card .tn { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #1a56c4; }
    .taller-card .td { font-size: 12px; color: #555; }
    .taller-wa { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 12px; font-weight: 700; color: #22c55e; text-decoration: none; }

    .cancelar-btn { width: 100%; padding: 12px; background: #fff; border: 1.5px solid #ef4444; color: #ef4444; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 16px; transition: background .2s; }
    .cancelar-btn:hover { background: #fef2f2; }

    .spinner-wrap { display: flex; justify-content: center; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: var(--rojo); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; color: #aaa; padding: 50px 20px; }
    .empty a { color: var(--rojo); font-weight: 600; text-decoration: none; }

    /* Línea de tiempo de estado */
    .timeline { display: flex; align-items: center; gap: 0; margin: 16px 0; }
    .tl-step { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; margin-bottom: 4px; }
    .tl-dot.done { background: #22c55e; }
    .tl-dot.active { background: var(--rojo); box-shadow: 0 0 0 3px rgba(230,57,70,.2); }
    .tl-label { font-size: 10px; color: #aaa; text-align: center; }
    .tl-label.active { color: var(--rojo); font-weight: 700; }
    .tl-label.done { color: #22c55e; }
    .tl-line { flex: 1; height: 2px; background: #ddd; margin-bottom: 14px; }
    .tl-line.done { background: #22c55e; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-b2c.js"></script>

<div id="header-b2c-root"></div>
<script src="js/header-b2c.js"></script>

<div class="wrap">
  <h1>Mis operaciones</h1>
  <p class="sub">Historial de tus compras y pedidos en Piezauto.</p>

  <!-- TABS OPERACIONES / TURNOS -->
  <div style="display:flex;gap:0;border-bottom:2px solid #eee;margin-bottom:20px">
    <button class="ops-tab active" id="tab-ops-btn"    onclick="switchOpsTab('ops')"    style="padding:10px 18px;font-size:13px;font-weight:700;background:none;border:none;border-bottom:2.5px solid var(--rojo);color:var(--rojo);cursor:pointer;font-family:inherit;margin-bottom:-2px">Mis pedidos</button>
    <button class="ops-tab"        id="tab-turnos-btn"    onclick="switchOpsTab('turnos')"   style="padding:10px 18px;font-size:13px;font-weight:700;background:none;border:none;border-bottom:2.5px solid transparent;color:#aaa;cursor:pointer;font-family:inherit;margin-bottom:-2px">
      📅 Mis turnos <span id="badge-turnos" style="display:none;background:var(--rojo);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:4px"></span>
    </button>
    <button class="ops-tab"        id="tab-vehiculos-btn" onclick="switchOpsTab('vehiculos')" style="padding:10px 18px;font-size:13px;font-weight:700;background:none;border:none;border-bottom:2.5px solid transparent;color:#aaa;cursor:pointer;font-family:inherit;margin-bottom:-2px">
      🚗 Mis vehículos
    </button>
  </div>

  <!-- SECCIÓN VEHÍCULOS -->
  <div id="seccion-vehiculos" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="font-size:13px;color:#888">Tus vehículos y su historial de trabajos</div>
      <a href="/registrar-trabajo" style="display:inline-flex;align-items:center;gap:6px;background:var(--rojo);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;text-decoration:none">+ Registrar trabajo</a>
    </div>
    <div id="lista-vehiculos-ops"><div style="text-align:center;padding:30px;color:#bbb">Cargando vehículos…</div></div>
  </div>

  <!-- SECCIÓN TURNOS -->
  <div id="seccion-turnos" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="font-size:13px;color:#888">Tus solicitudes de turno en talleres Piezauto</div>
      <a href="/solicitar-turno.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--rojo);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;text-decoration:none;transition:opacity .15s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">+ Solicitar turno</a>
    </div>
    <div id="lista-turnos"><div style="text-align:center;padding:30px;color:#bbb">Cargando turnos…</div></div>
  </div>

  <div id="seccion-ops">
  <div class="filtros">
    <select id="filtro-estado" onchange="cargarOps()">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="pagado">Pagado</option>
      <option value="enviado">Enviado</option>
      <option value="entregado">Entregado</option>
      <option value="cancelado">Cancelado</option>
    </select>
  </div>

  <div id="ops-lista" class="op-list">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal-overlay" id="modal-op" onclick="cerrarModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title" id="modal-titulo">Cargando...</div>
    <div id="modal-contenido"></div>
  </div>
</div>

<script src="js/carrito.js"></script>
<script>
const ESTADOS_TL = ['pendiente','pagado','enviado','entregado'];
const ESTADO_LABELS = {
  pendiente: 'Pendiente de confirmación',
  pagado:    'Pago confirmado',
  enviado:   'Enviado',
  entregado: 'Entregado',
  cancelado: 'Cancelado',
};

async function initPage() {
  let session = null;
  try { const { data } = await dbB2C.auth.getSession(); session = data?.session; } catch {}
  if (!session) { window.location.href = 'login.html?redirect=/operaciones.html'; return; }

  if (typeof initHeaderB2C === 'function') initHeaderB2C();
  await cargarOps();
}

async function cargarOps() {
  const estado = document.getElementById('filtro-estado').value;
  const cliente = await getClienteActual();
  if (!cliente) {
    document.getElementById('ops-lista').innerHTML = '<div class="empty">No encontramos tu perfil. <a href="perfil.html">Completá tu perfil</a>.</div>';
    return;
  }

  let q = dbB2C
    .from('cat_operaciones_b2c')
    .select('id, estado, total, direccion_entrega, notas, created_at, updated_at, taller_id, metodo_pago, cat_recomendaciones_talleres!taller_id(nombre, direccion, localidad, whatsapp)')
    .eq('cliente_id', cliente.id)
    .order('created_at', { ascending: false })
    .limit(50);

  if (estado) q = q.eq('estado', estado);

  const { data: ops } = await q;
  renderLista(ops || []);
}

function renderLista(ops) {
  const wrap = document.getElementById('ops-lista');
  if (!ops.length) {
    wrap.innerHTML = `<div class="empty">
      <div style="font-size:40px;margin-bottom:12px">📦</div>
      <div style="font-size:16px;font-weight:700;color:#333;margin-bottom:8px">Sin operaciones todavía</div>
      <a href="buscar.html">Ir al catálogo →</a>
    </div>`;
    return;
  }

  wrap.innerHTML = ops.map(op => {
    const num   = op.id.slice(0,8).toUpperCase();
    const fecha = new Date(op.created_at).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
    const badge = `<span class="badge badge-${op.estado}">${ESTADO_LABELS[op.estado] || op.estado}</span>`;
    const notas = parseNotas(op.notas);
    const tallerNombre = op.cat_recomendaciones_talleres?.nombre || notas.taller?.nombre;
    const tallerTag = tallerNombre
      ? `<div class="taller-tag">🔧 ${escH(tallerNombre)}</div>`
      : '';
    const pago = op.metodo_pago || notas.metodo_pago;
    return `<div class="op-card ${op.estado}" onclick="abrirDetalle('${op.id}')">
      <div class="op-row">
        <div class="op-info">
          <div class="op-num">#${escH(num)}</div>
          <div style="margin-top:4px">${badge}</div>
          ${tallerTag}
          <div class="op-meta">${fecha}${pago ? ' · ' + pago : ''}</div>
        </div>
        <div class="op-total">$${Number(op.total).toLocaleString('es-AR')}</div>
      </div>
    </div>`;
  }).join('');
}

async function abrirDetalle(opId) {
  document.getElementById('modal-op').classList.add('open');
  document.getElementById('modal-titulo').textContent   = 'Cargando...';
  document.getElementById('modal-contenido').innerHTML  = '<div class="spinner-wrap"><div class="spinner"></div></div>';

  const { data: op } = await dbB2C
    .from('cat_operaciones_b2c')
    .select('id, estado, total, subtotal, descuento, direccion_entrega, notas, created_at, metodo_pago, taller_id, cat_recomendaciones_talleres!taller_id(nombre, razon_social, direccion, localidad, whatsapp)')
    .eq('id', opId).single();

  const { data: items } = await dbB2C
    .from('cat_operaciones_b2c_items')
    .select('cantidad, precio_unitario, subtotal, cat_skus!sku_id(codigo_piezauto, descripcion, descripcion_corta)')
    .eq('operacion_id', opId);

  if (!op) { document.getElementById('modal-titulo').textContent = 'Error'; return; }

  const num   = op.id.slice(0,8).toUpperCase();
  const notas = parseNotas(op.notas);
  const badge = `<span class="badge badge-${op.estado}">${ESTADO_LABELS[op.estado] || op.estado}</span>`;
  document.getElementById('modal-titulo').innerHTML = `Pedido #${num} ${badge}`;

  // Timeline
  const tlHtml = op.estado === 'cancelado'
    ? `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:13px;color:#c62828;margin-bottom:14px">❌ Este pedido fue cancelado.</div>`
    : (() => {
        const idx = ESTADOS_TL.indexOf(op.estado);
        let tl = '<div class="timeline">';
        ESTADOS_TL.forEach((e, i) => {
          const cls = i < idx ? 'done' : i === idx ? 'active' : '';
          if (i > 0) tl += `<div class="tl-line${i <= idx ? ' done' : ''}"></div>`;
          tl += `<div class="tl-step"><div class="tl-dot ${cls}"></div><div class="tl-label ${cls}">${e.charAt(0).toUpperCase()+e.slice(1)}</div></div>`;
        });
        tl += '</div>';
        return tl;
      })();

  // Items
  const itemsHtml = (items || []).map(i => {
    const sku = i.cat_skus || {};
    return `<div class="item-row">
      <span>${escH(sku.descripcion_corta || sku.descripcion || 'Autoparte')} <span style="color:#aaa;font-size:11px">${escH(sku.codigo_piezauto||'')}</span> x${i.cantidad}</span>
      <strong>$${Number(i.subtotal).toLocaleString('es-AR')}</strong>
    </div>`;
  }).join('');

  // Taller
  const taller = op.cat_recomendaciones_talleres || notas.taller;
  const tallerHtml = taller ? `
    <div class="taller-card">
      <div class="tn">🔧 ${escH(taller.nombre)}</div>
      <div class="td">${escH(taller.direccion || '')}${taller.localidad ? ', ' + escH(taller.localidad) : ''}</div>
      ${taller.whatsapp ? `<a class="taller-wa" href="https://wa.me/54${taller.whatsapp.replace(/\D/g,'')}" target="_blank">💬 Escribir al taller</a>` : ''}
      <div style="font-size:11px;color:#555;margin-top:8px;line-height:1.5">El taller va a contactarte para coordinar el turno de instalación.</div>
    </div>` : '';

  // Instrucciones de pago (si pendiente)
  const pagoHtml = op.estado === 'pendiente'
    ? `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px 14px;font-size:13px;color:#795548;margin-top:14px">
        ⏳ <strong>Pago pendiente:</strong> te contactamos por WhatsApp para confirmar el pago (transferencia o efectivo).
       </div>` : '';

  // Botón cancelar (solo si pendiente)
  const cancelBtn = op.estado === 'pendiente'
    ? `<button class="cancelar-btn" onclick="cancelarOp('${op.id}')">Cancelar pedido</button>` : '';

  const pago = op.metodo_pago || notas.metodo_pago;

  document.getElementById('modal-contenido').innerHTML = `
    ${tlHtml}
    <div class="section-h">Datos del pedido</div>
    <div class="info-row"><span class="info-label">Número</span><span class="info-val">#${escH(num)}</span></div>
    <div class="info-row"><span class="info-label">Fecha</span><span class="info-val">${new Date(op.created_at).toLocaleString('es-AR')}</span></div>
    <div class="info-row"><span class="info-label">Total</span><span class="info-val" style="color:var(--rojo);font-size:16px">$${Number(op.total).toLocaleString('es-AR')}</span></div>
    ${pago ? `<div class="info-row"><span class="info-label">Pago</span><span class="info-val">${escH(pago)}</span></div>` : ''}
    <div class="info-row"><span class="info-label">Entrega en</span><span class="info-val">${escH(op.direccion_entrega||'—')}</span></div>
    ${notas.notas_cliente ? `<div class="info-row"><span class="info-label">Tu nota</span><span class="info-val">${escH(notas.notas_cliente)}</span></div>` : ''}

    <div class="section-h" style="margin-top:16px">Piezas (${items?.length||0})</div>
    ${itemsHtml || '<div style="color:#aaa;font-size:13px">Sin items.</div>'}

    ${tallerHtml}
    ${pagoHtml}
    ${cancelBtn}`;
}

async function cancelarOp(opId) {
  if (!confirm('¿Cancelás este pedido? Esta acción no se puede deshacer.')) return;
  await dbB2C.from('cat_operaciones_b2c').update({ estado: 'cancelado', updated_at: new Date().toISOString() }).eq('id', opId);
  cerrarModal();
  await cargarOps();
}

function cerrarModal(evt) {
  if (evt && evt.target !== document.getElementById('modal-op')) return;
  document.getElementById('modal-op').classList.remove('open');
}

function parseNotas(n) { if (!n) return {}; try { return JSON.parse(n); } catch { return {}; } }
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', initPage);

// ─── TURNOS ─────────────────────────────────────────────────────────────────
let turnosData = [];

function switchOpsTab(tab) {
  const tabs = ['ops', 'turnos', 'vehiculos'];
  tabs.forEach(t => {
    const secEl = document.getElementById('seccion-' + t);
    const btnEl = document.getElementById('tab-' + t + '-btn');
    if (!secEl || !btnEl) return;
    const isActive = t === tab;
    secEl.style.display = isActive ? '' : 'none';
    btnEl.style.borderBottomColor = isActive ? 'var(--rojo)' : 'transparent';
    btnEl.style.color             = isActive ? 'var(--rojo)' : '#aaa';
  });
  if (tab === 'turnos'    && !turnosData.length)    cargarTurnos();
  if (tab === 'vehiculos' && !vehiculosOpsLoaded)   cargarVehiculosOps();
}

async function cargarTurnos() {
  const cont = document.getElementById('lista-turnos');
  cont.innerHTML = '<div style="text-align:center;padding:30px;color:#bbb"><div style="width:24px;height:24px;border:3px solid #eee;border-top-color:var(--rojo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>Cargando…</div>';
  try {
    const { data: s } = await dbB2C.auth.getSession();
    if (!s?.session) { cont.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">Iniciá sesión para ver tus turnos.</div>'; return; }
    const uid = s.session.user.id;
    // Obtener cliente_id
    const { data: cli } = await dbB2C.from('cat_clientes_finales').select('id').eq('auth_user_id', uid).single();
    if (!cli) { cont.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">No se encontró tu perfil de cliente.</div>'; return; }

    const { data: turnos } = await dbB2C.from('cat_turnos')
      .select('id,taller_id,tipo,estado,fecha,hora_inicio,motivo,calificacion_cliente_al_taller,cat_recomendaciones_talleres(nombre)')
      .eq('cliente_id', cli.id)
      .order('fecha', { ascending: false })
      .limit(20);

    turnosData = turnos || [];
    if (!turnosData.length) {
      cont.innerHTML = '<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">No tenés turnos registrados. <a href="/solicitar-turno.html" style="color:var(--rojo)">Pedí uno →</a></div>';
      return;
    }

    // Badge en tab
    const activos = turnosData.filter(t => ['pendiente','confirmado','en_proceso'].includes(t.estado)).length;
    if (activos > 0) {
      const badge = document.getElementById('badge-turnos');
      badge.textContent = activos;
      badge.style.display = '';
    }

    const TIPO_L = { inspeccion_presupuesto:'Inspección/Pres.', inicio_trabajo:'Inicio trabajo', consulta:'Consulta', reclamo:'Reclamo' };
    const EST_L  = { pendiente:'Pendiente', confirmado:'Confirmado', en_proceso:'En proceso', finalizado:'Finalizado', cancelado:'Cancelado' };
    const EST_CLS= { pendiente:'#fff8e1;#b45309', confirmado:'#dbeafe;#1d4ed8', en_proceso:'#ede9fe;#7c3aed', finalizado:'#dcfce7;#15803d', cancelado:'#fee2e2;#dc2626' };

    cont.innerHTML = turnosData.map(t => {
      const [bg, cl] = (EST_CLS[t.estado] || '#f0f0f0;#666').split(';');
      const tallerNombre = t.cat_recomendaciones_talleres?.nombre || '—';
      const fechaStr = new Date(t.fecha + 'T00:00:00').toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'short' });
      const puedeCalif = t.estado === 'finalizado' && !t.calificacion_cliente_al_taller;

      return `<div style="background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:16px;margin-bottom:10px;cursor:pointer" onclick="window.location='/solicitar-turno.html?ver=${t.id}'">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div style="flex:1">
            <div style="font-size:11px;color:#aaa;font-weight:700;margin-bottom:2px">${tallerNombre}</div>
            <div style="font-size:14px;font-weight:700">${TIPO_L[t.tipo] || t.tipo}</div>
            <div style="font-size:12px;color:#888;margin-top:3px">📅 ${fechaStr} · ${t.hora_inicio?.slice(0,5) || ''}</div>
            ${t.motivo ? '<div style="font-size:12px;color:#666;margin-top:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">' + escH(t.motivo) + '</div>' : ''}
          </div>
          <span style="background:${bg};color:${cl};font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0">${EST_L[t.estado] || t.estado}</span>
        </div>
        ${puedeCalif ? '<button onclick="event.stopPropagation();abrirCalifTurno(\'' + t.id + '\')" style="margin-top:10px;padding:6px 14px;background:var(--rojo);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">★ Calificar taller</button>' : ''}
        ${t.calificacion_cliente_al_taller ? '<div style="margin-top:8px;font-size:12px;color:#888">Tu calificación: ' + '★'.repeat(t.calificacion_cliente_al_taller) + '</div>' : ''}
      </div>`;
    }).join('');
  } catch (e) {
    cont.innerHTML = '<div style="text-align:center;padding:20px;color:#c00;font-size:13px">Error: ' + e.message + '</div>';
  }
}

// Modal calificación simple
let califTurnoId = null, califTurnoVal = 0;
function abrirCalifTurno(turnoId) {
  califTurnoId = turnoId; califTurnoVal = 0;
  const modal = document.createElement('div');
  modal.id = 'modal-calif-turno';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:380px">
      <div style="font-size:16px;font-weight:800;margin-bottom:4px">¿Cómo fue el taller?</div>
      <div style="font-size:13px;color:#888;margin-bottom:16px">Tu opinión ayuda a otros clientes.</div>
      <div id="estrellas-cli" style="display:flex;gap:8px;font-size:32px;margin-bottom:16px;cursor:pointer">
        ${[1,2,3,4,5].map(v => '<span data-v="' + v + '" onclick="setCalifTurno(' + v + ')" style="opacity:.3">★</span>').join('')}
      </div>
      <textarea id="resena-cli" rows="3" placeholder="Contá tu experiencia…" style="width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;outline:none;resize:none"></textarea>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button onclick="document.getElementById('modal-calif-turno').remove()" style="flex:1;padding:11px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Cancelar</button>
        <button onclick="enviarCalifTurno()" style="flex:1;padding:11px;border:none;border-radius:8px;background:var(--rojo);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Enviar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}
function setCalifTurno(v) {
  califTurnoVal = v;
  document.querySelectorAll('#estrellas-cli span').forEach(el => { el.style.opacity = parseInt(el.dataset.v) <= v ? '1' : '.3'; });
}
async function enviarCalifTurno() {
  const resena = document.getElementById('resena-cli')?.value?.trim() || null;
  try {
    await dbB2C.from('cat_turnos').update({ calificacion_cliente_al_taller: califTurnoVal || null, resena_cliente: resena, updated_at: new Date().toISOString() }).eq('id', califTurnoId);
    document.getElementById('modal-calif-turno').remove();
    turnosData = []; cargarTurnos();
  } catch (e) { alert('Error: ' + e.message); }
}

// ─── VEHÍCULOS ───────────────────────────────────────────────────────────────
let vehiculosOpsLoaded = false;

async function cargarVehiculosOps() {
  vehiculosOpsLoaded = true;
  const cont = document.getElementById('lista-vehiculos-ops');
  const cliente = await getClienteActual();
  if (!cliente) { cont.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">Iniciá sesión para ver tus vehículos.</div>'; return; }

  const { data: vhs, error } = await dbB2C
    .from('cat_clientes_vehiculos')
    .select('id, marca, modelo, anio, patente, km_actual')
    .eq('cliente_id', cliente.id)
    .order('created_at', { ascending: false });

  if (error || !vhs?.length) {
    cont.innerHTML = `<div style="text-align:center;padding:32px 0;color:#aaa">
      <div style="font-size:36px;margin-bottom:10px">🚗</div>
      <div style="font-size:14px;color:#666">No tenés vehículos registrados.</div>
      <a href="/vehiculos" style="display:inline-block;margin-top:14px;color:var(--rojo);font-weight:700;font-size:13px">+ Agregar vehículo</a>
    </div>`;
    return;
  }

  // Para cada vehículo cargar el último trabajo
  const ids = vhs.map(v => v.id);
  const { data: trabajos } = await dbB2C
    .from('cat_vehiculo_trabajos')
    .select('vehiculo_id, descripcion, fecha, servicio_id')
    .in('vehiculo_id', ids)
    .order('fecha', { ascending: false });

  const ultimoPor = {};
  (trabajos || []).forEach(t => { if (!ultimoPor[t.vehiculo_id]) ultimoPor[t.vehiculo_id] = t; });

  const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  cont.innerHTML = vhs.map(v => {
    const label = [v.marca, v.modelo, v.anio].filter(Boolean).join(' ');
    const ult   = ultimoPor[v.id];
    return `<div style="border:1.5px solid #e8e8e8;border-radius:10px;padding:14px;margin-bottom:10px;background:#fff">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div>
          <div style="font-size:15px;font-weight:700">${escH(label)}</div>
          ${v.patente ? `<div style="font-size:12px;color:#888;margin-top:2px">🔢 ${escH(v.patente)}</div>` : ''}
          ${v.km_actual ? `<div style="font-size:12px;color:#888;margin-top:2px">🛣️ ${Number(v.km_actual).toLocaleString('es-AR')} km</div>` : ''}
          ${ult ? `<div style="font-size:12px;color:#666;margin-top:6px;padding:6px 8px;background:#f8f8f8;border-radius:6px">🔧 Último: ${escH(ult.descripcion)} — ${new Date(ult.fecha+'T00:00:00').toLocaleDateString('es-AR')}</div>` : '<div style="font-size:12px;color:#bbb;margin-top:6px">Sin trabajos registrados</div>'}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <a href="/mi-vehiculo?v=${v.id}" style="display:inline-flex;align-items:center;gap:4px;background:var(--rojo);color:#fff;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;text-decoration:none">📋 Carnet</a>
          <a href="/registrar-trabajo?v=${v.id}" style="display:inline-flex;align-items:center;gap:4px;background:#f5f5f5;color:#444;border:1px solid #ddd;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;text-decoration:none">+ Trabajo</a>
        </div>
      </div>
    </div>`;
  }).join('');
}
</script>
