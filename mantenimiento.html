<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitio en mantenimiento — Piezauto</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .mant-card {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .mant-logo {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, #E63946 0%, #ff6b6b 50%, #c1121f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
    }
    .mant-icono {
      font-size: 72px;
      margin-bottom: 24px;
      animation: girar 3s linear infinite;
    }
    @keyframes girar {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .mant-titulo {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .mant-mensaje {
      font-size: 16px;
      color: #aaa;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .mant-eta-wrap {
      display: inline-block;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px 28px;
      margin-bottom: 32px;
    }
    .mant-eta-label {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }
    .mant-eta-valor {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }
    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25d366;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-weight: 700;
      font-size: 16px;
      transition: opacity 0.2s;
    }
    .btn-wa:hover { opacity: 0.88; }
    .mant-footer {
      margin-top: 40px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
<div class="mant-card">
  <div class="mant-logo">Piezauto</div>
  <div class="mant-icono">🔧</div>
  <h1 class="mant-titulo">Sitio en mantenimiento</h1>
  <p class="mant-mensaje" id="mant-mensaje">
    Estamos trabajando para mejorar tu experiencia.<br>Volvemos muy pronto.
  </p>

  <div class="mant-eta-wrap" id="mant-eta-wrap" style="display:none">
    <div class="mant-eta-label">Tiempo estimado de vuelta</div>
    <div class="mant-eta-valor" id="mant-eta-valor">—</div>
  </div>

  <div id="mant-wa-wrap" style="display:none">
    <a id="mant-wa-link" href="#" class="btn-wa" target="_blank" rel="noopener">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Contactar por WhatsApp
    </a>
  </div>

  <div class="mant-footer">
    Piezauto — Autopartes del AMBA
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
(async function () {
  try {
    const { data } = await db.from('configuracion').select('clave, valor')
      .in('clave', ['modo_mantenimiento', 'mantenimiento_mensaje', 'mantenimiento_eta', 'wa_flotante']);
    const cfg = {};
    (data || []).forEach(r => { cfg[r.clave] = r.valor; });

    // Si mantenimiento está desactivado, redirigir al inicio
    if (cfg['modo_mantenimiento'] !== 'true') {
      window.location.replace('index.html');
      return;
    }

    const msg = cfg['mantenimiento_mensaje'];
    const eta = cfg['mantenimiento_eta'];
    const wa  = cfg['wa_flotante'];

    if (msg) document.getElementById('mant-mensaje').textContent = msg;
    if (eta) {
      document.getElementById('mant-eta-wrap').style.display = 'inline-block';
      document.getElementById('mant-eta-valor').textContent  = eta;
    }
    if (wa) {
      const waWrap = document.getElementById('mant-wa-wrap');
      const waLink = document.getElementById('mant-wa-link');
      waWrap.style.display = 'block';
      waLink.href = `https://wa.me/${wa}?text=Hola%2C+me+comunico+por+el+mantenimiento+del+sitio`;
    }
  } catch (_) {}
})();
</script>
</body>
</html>
