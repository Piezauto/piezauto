<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Piezauto</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    body { background: var(--negro); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .marca { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #E63946 0%, #ff6b6b 50%, #c1121f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-logo .sub { font-size: 12px; color: #555; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }
    .login-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px; padding: 32px; }
    .login-card h2 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .login-card p { font-size: 13px; color: #666; margin-bottom: 26px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input { padding: 12px 14px; background: #111; border: 1.5px solid #333; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.15s; }
    .form-group input:focus { border-color: var(--rojo); }
    .form-group input::placeholder { color: #444; }
    .btn-login { width: 100%; padding: 13px; background: var(--rojo); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-msg { margin-top: 14px; font-size: 13px; font-weight: 600; text-align: center; min-height: 20px; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #444; }
    .login-footer a { color: var(--rojo); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <div class="marca">Piezauto</div>
    <div class="sub">Panel de administración</div>
  </div>

  <div class="login-card">
    <h2>Acceso restringido</h2>
    <p>Solo para administradores autorizados de Piezauto.</p>

    <div class="form-group">
      <label>Email de administrador</label>
      <input type="email" id="login-email" placeholder="admin@piezauto.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login" onclick="iniciarSesionAdmin()">Ingresar</button>
    <div class="login-msg" id="login-msg"></div>
  </div>

  <div class="login-footer">
    <a href="../index.html">← Volver al sitio</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="../js/supabase.js" defer></script>
<script>
// Si ya tiene sesión activa, redirigir directo
if (sessionStorage.getItem('pz_admin')) {
  window.location.replace('index.html');
}

const BLOQUEO_KEY   = 'pz_admin_bloqueo';
const INTENTOS_KEY  = 'pz_admin_intentos';
const MAX_INTENTOS  = 3;
const BLOQUEO_MS    = 5 * 60 * 1000; // 5 minutos

function verificarBloqueo() {
  const bloqueo = localStorage.getItem(BLOQUEO_KEY);
  if (!bloqueo) return false;
  const restante = parseInt(bloqueo) - Date.now();
  if (restante > 0) {
    const mins = Math.ceil(restante / 60000);
    mostrarMsg(`🔒 Demasiados intentos fallidos. Intentá de nuevo en ${mins} minuto${mins > 1 ? 's' : ''}.`, '#f59e0b');
    document.getElementById('btn-login').disabled = true;
    return true;
  }
  localStorage.removeItem(BLOQUEO_KEY);
  localStorage.removeItem(INTENTOS_KEY);
  document.getElementById('btn-login').disabled = false;
  return false;
}

function registrarIntentoFallido() {
  let intentos = parseInt(localStorage.getItem(INTENTOS_KEY) || '0') + 1;
  localStorage.setItem(INTENTOS_KEY, intentos);
  if (intentos >= MAX_INTENTOS) {
    localStorage.setItem(BLOQUEO_KEY, Date.now() + BLOQUEO_MS);
    mostrarMsg('🔒 Tres intentos fallidos. Panel bloqueado por 5 minutos.', '#E63946');
    document.getElementById('btn-login').disabled = true;
  } else {
    mostrarMsg(`❌ Credenciales incorrectas. Intentos restantes: ${MAX_INTENTOS - intentos}.`, '#f66');
  }
}

function mostrarMsg(texto, color) {
  const el = document.getElementById('login-msg');
  el.style.color = color;
  el.textContent = texto;
}

async function iniciarSesionAdmin() {
  if (verificarBloqueo()) return;

  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;

  if (!email || !pass) {
    mostrarMsg('⚠️ Completá email y contraseña.', '#f59e0b');
    return;
  }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  mostrarMsg('Verificando...', '#888');

  try {
    // Leer credenciales desde tabla configuracion
    const { data } = await db.from('configuracion')
      .select('clave, valor')
      .in('clave', ['admin_email', 'admin_password_hash']);

    const cfg = Object.fromEntries((data || []).map(r => [r.clave, r.valor]));

    const emailCorrecto = cfg.admin_email && cfg.admin_email.toLowerCase() === email;
    const passCorrecto  = cfg.admin_password_hash && cfg.admin_password_hash === pass;

    if (emailCorrecto && passCorrecto) {
      localStorage.removeItem(INTENTOS_KEY);
      localStorage.removeItem(BLOQUEO_KEY);
      sessionStorage.setItem('pz_admin', JSON.stringify({
        email,
        ingreso: new Date().toISOString(),
      }));
      mostrarMsg('✅ Acceso correcto. Cargando panel...', '#22c55e');
      setTimeout(() => window.location.href = 'index.html', 600);
    } else {
      btn.disabled = false;
      registrarIntentoFallido();
    }
  } catch (e) {
    btn.disabled = false;
    mostrarMsg('❌ Error de conexión. Intentá de nuevo.', '#f66');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  verificarBloqueo();
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesionAdmin();
  });
});
</script>
</body>
</html>
