<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referidos — Piezauto</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    body { background: #f0f0f0; }
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 72px; }
    .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
    .page-titulo { font-size: 22px; font-weight: 800; flex: 1; }
    .back-link { font-size: 13px; color: #888; text-decoration: none; font-weight: 600; }
    .back-link:hover { color: #333; }

    /* Kanban */
    .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    @media(max-width:900px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:540px) { .kanban { grid-template-columns: 1fr; } }

    .columna { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; }
    .col-header { padding: 14px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
    .col-count { font-size: 11px; background: rgba(0,0,0,.08); border-radius: 20px; padding: 2px 8px; font-weight: 700; }
    .col-body { padding: 10px; min-height: 80px; }
    .ref-card { background: #f8f8f8; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: box-shadow .15s; }
    .ref-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .ref-card-nombre { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .ref-card-sub { font-size: 11px; color: #888; }
    .ref-card-monto { font-size: 12px; font-weight: 700; color: #2e7d32; margin-top: 5px; }

    .col-nuevo       .col-header { background: #e3f2fd; color: #1565c0; }
    .col-contactado  .col-header { background: #fff3e0; color: #e65100; }
    .col-primera_compra .col-header { background: #f3e5f5; color: #6a1b9a; }
    .col-activo      .col-header { background: #e8f5e9; color: #2e7d32; }
    .col-inactivo    .col-header { background: #f5f5f5; color: #888; }

    /* Modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: center; justify-content: center; }
    .modal-bg.abierto { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
    .modal-titulo { font-size: 17px; font-weight: 800; margin-bottom: 20px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; font-family: inherit; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #E63946; }
    .form-row textarea { resize: vertical; min-height: 70px; }
    .modal-acciones { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { background: #f0f0f0; color: #333; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-guardar { background: #E63946; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-guardar:hover { background: #c1121f; }
    .modal-msg { font-size: 12px; text-align: center; margin-top: 10px; min-height: 16px; }
    .modal-msg.ok  { color: #2e7d32; }
    .modal-msg.err { color: #c00; }

    .campo-credito { display: none; }
    .campo-credito.visible { display: block; }

    .spinner-wrap { display: flex; justify-content: center; padding: 40px; }
    .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: #E63946; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-col { font-size: 12px; color: #ccc; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<div class="page-wrap">
  <div class="page-header">
    <a href="index.html" class="back-link">← Panel admin</a>
    <div class="page-titulo">🤝 Pipeline de Referidos</div>
  </div>

  <div id="kanban-wrap">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- Modal detalle / transición -->
<div class="modal-bg" id="modal-ref">
  <div class="modal">
    <div class="modal-titulo" id="modal-ref-titulo">Referido</div>
    <div class="form-row">
      <label>Taller</label>
      <input type="text" id="ref-det-taller" readonly style="background:#f8f8f8">
    </div>
    <div class="form-row">
      <label>Referente (cliente)</label>
      <input type="text" id="ref-det-cliente" readonly style="background:#f8f8f8">
    </div>
    <div class="form-row">
      <label>Estado actual → Nuevo estado</label>
      <select id="ref-det-estado" onchange="onEstadoChange()">
        <option value="nuevo">Nuevo</option>
        <option value="contactado">Contactado</option>
        <option value="primera_compra">Primera compra</option>
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>
    </div>
    <div class="form-row campo-credito" id="campo-monto-compra">
      <label>Monto primera compra ($) *</label>
      <input type="number" id="ref-monto-compra" min="0" step="0.01" placeholder="0.00">
    </div>
    <div class="form-row">
      <label>Notas internas</label>
      <textarea id="ref-det-notas" placeholder="Observaciones..."></textarea>
    </div>
    <div class="modal-acciones">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" id="btn-guardar-ref" onclick="guardarReferido()">Guardar</button>
    </div>
    <div class="modal-msg" id="ref-msg"></div>
  </div>
</div>

<script>
const ESTADOS = ['nuevo', 'contactado', 'primera_compra', 'activo', 'inactivo'];
const ESTADO_LABEL = { nuevo:'Nuevo', contactado:'Contactado', primera_compra:'1ª Compra', activo:'Activo', inactivo:'Inactivo' };

let _referidos = [];
let _editId    = null;
let _editClienteId = null;

async function verificarAcceso() {
  const session = sessionStorage.getItem('pz_admin');
  if (!session) { window.location.href = 'index.html'; return false; }
  return true;
}

async function init() {
  if (!await verificarAcceso()) return;
  await cargarReferidos();
}

async function cargarReferidos() {
  const { data, error } = await db
    .from('cat_referidos_talleres')
    .select(`
      id, estado, created_at, updated_at, monto_primera_compra, credito_generado, notas,
      cat_recomendaciones_talleres!taller_id(nombre, telefono, localidad),
      cat_clientes_finales!cliente_referente_id(nombre, apellido, email)
    `)
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('kanban-wrap').innerHTML = '<div style="text-align:center;padding:40px;color:#888">Error cargando referidos.</div>';
    return;
  }

  _referidos = data || [];
  renderKanban();
}

function renderKanban() {
  const cols = {};
  ESTADOS.forEach(e => { cols[e] = []; });
  _referidos.forEach(r => { if (cols[r.estado]) cols[r.estado].push(r); });

  const html = ESTADOS.map(estado => {
    const cards = cols[estado].map(r => {
      const taller  = r.cat_recomendaciones_talleres?.nombre || '—';
      const cliente = r.cat_clientes_finales
        ? (r.cat_clientes_finales.nombre + ' ' + r.cat_clientes_finales.apellido).trim()
        : 'Sin referente';
      const monto = r.credito_generado
        ? `<div class="ref-card-monto">Crédito: $${Number(r.credito_generado).toLocaleString('es-AR')}</div>`
        : '';
      return `<div class="ref-card" onclick="abrirModal('${r.id}')">
        <div class="ref-card-nombre">${escHtml(taller)}</div>
        <div class="ref-card-sub">${escHtml(cliente)}</div>
        ${monto}
      </div>`;
    }).join('') || '<div class="empty-col">Vacío</div>';

    return `<div class="columna col-${estado}">
      <div class="col-header">
        <span>${ESTADO_LABEL[estado]}</span>
        <span class="col-count">${cols[estado].length}</span>
      </div>
      <div class="col-body">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('kanban-wrap').innerHTML = `<div class="kanban">${html}</div>`;
}

function abrirModal(id) {
  const r = _referidos.find(x => x.id === id);
  if (!r) return;
  _editId = id;
  _editClienteId = r.cat_clientes_finales?.id || null;

  document.getElementById('modal-ref-titulo').textContent = 'Referido: ' + (r.cat_recomendaciones_talleres?.nombre || '—');
  document.getElementById('ref-det-taller').value  = r.cat_recomendaciones_talleres?.nombre || '—';
  document.getElementById('ref-det-cliente').value = r.cat_clientes_finales
    ? (r.cat_clientes_finales.nombre + ' ' + r.cat_clientes_finales.apellido + ' — ' + r.cat_clientes_finales.email)
    : 'Sin referente';
  document.getElementById('ref-det-estado').value  = r.estado;
  document.getElementById('ref-det-notas').value   = r.notas || '';
  document.getElementById('ref-monto-compra').value = r.monto_primera_compra || '';
  document.getElementById('ref-msg').textContent    = '';
  document.getElementById('ref-msg').className      = 'modal-msg';

  onEstadoChange();
  document.getElementById('modal-ref').classList.add('abierto');
}

function onEstadoChange() {
  const estado = document.getElementById('ref-det-estado').value;
  const campo  = document.getElementById('campo-monto-compra');
  campo.classList.toggle('visible', estado === 'primera_compra');
}

function cerrarModal() {
  document.getElementById('modal-ref').classList.remove('abierto');
  _editId = null;
}

async function guardarReferido() {
  const estado  = document.getElementById('ref-det-estado').value;
  const notas   = document.getElementById('ref-det-notas').value.trim() || null;
  const monto   = parseFloat(document.getElementById('ref-monto-compra').value) || null;
  const msg     = document.getElementById('ref-msg');

  if (estado === 'primera_compra' && !monto) {
    msg.textContent = 'Ingresá el monto de la primera compra.';
    msg.className = 'modal-msg err';
    return;
  }

  document.getElementById('btn-guardar-ref').disabled = true;
  msg.textContent = '';

  const payload = { estado, notas, updated_at: new Date().toISOString() };
  if (estado === 'primera_compra' && monto) {
    const credito = Math.round(monto * 0.10 * 100) / 100;
    payload.monto_primera_compra = monto;
    payload.credito_generado     = credito;
    payload.credito_otorgado_at  = new Date().toISOString();
  }

  const { error } = await db
    .from('cat_referidos_talleres')
    .update(payload)
    .eq('id', _editId);

  if (error) {
    msg.textContent = 'Error: ' + error.message;
    msg.className = 'modal-msg err';
    document.getElementById('btn-guardar-ref').disabled = false;
    return;
  }

  // Si hay primera compra y hay referente, acreditar wallet
  if (estado === 'primera_compra' && monto && _editClienteId) {
    const credito = Math.round(monto * 0.10 * 100) / 100;
    await db.rpc('fn_aplicar_movimiento_wallet', {
      p_cliente_id:   _editClienteId,
      p_tipo:         'credito',
      p_concepto:     'Crédito por referido de taller (10% primera compra)',
      p_monto:        credito,
      p_operacion_id: null,
      p_vence_at:     new Date(Date.now() + 365 * 24 * 3600 * 1000).toISOString(),
    }).catch(() => {});
  }

  msg.textContent = 'Guardado correctamente.';
  msg.className = 'modal-msg ok';
  await cargarReferidos();
  setTimeout(cerrarModal, 1000);

  document.getElementById('btn-guardar-ref').disabled = false;
}

document.getElementById('modal-ref').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-ref')) cerrarModal();
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
