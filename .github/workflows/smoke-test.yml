name: Smoke Tests — Piezauto B2C

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-hito4:
    name: Smoke Test Hito 4 — Auth B2C
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test Hito 4
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node smoke_test_hito4.js

  smoke-fase2:
    name: Smoke Test Fase 2 — Búsqueda + Carrito
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke-hito4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test Fase 2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node smoke_test_fase2.js

  smoke-fase3:
    name: Smoke Test Fase 3 — Checkout + Confirmación + Taller
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke-fase2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test Fase 3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node smoke_test_fase3.js

  smoke-fase4:
    name: Smoke Test Fase 4 — Panel Taller + Notificaciones + Operaciones
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke-fase3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test Fase 4
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node smoke_test_fase4.js

  smoke-fase5:
    name: Smoke Test Fase 5 — Point + Turnos + RLS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke-fase4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test Fase 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://piezauto.piezauto1.workers.dev' }}
        run: node smoke_test_fase5.js
